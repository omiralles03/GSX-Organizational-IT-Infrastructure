name: CI/CD Pipeline for GSX Week 11

on:
  push:
    branches: [ "main" ]

jobs:
  # Build, Scan and Push Images
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # [ADVANCED]: Configure Docker Buildx to enable Cache for faster builds
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Strict Login: Fails if an unauthorized user pushes code
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ github.actor == 'Rafita-pino' && secrets.DOCKERHUB_USERNAME_RAFA || (github.actor == 'omiralles03' && secrets.DOCKERHUB_USERNAME_OUPMAN || 'ERROR_UNAUTHORIZED_USER') }}
          password: ${{ github.actor == 'Rafita-pino' && secrets.DOCKERHUB_TOKEN_RAFA || (github.actor == 'omiralles03' && secrets.DOCKERHUB_TOKEN_OUPMAN || 'ERROR_UNAUTHORIZED_TOKEN') }}

      # ---------------- BACKEND APP ----------------
      - name: Extract metadata (Node.js App)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ github.actor == 'Rafita-pino' && secrets.DOCKERHUB_USERNAME_RAFA || (github.actor == 'omiralles03' && secrets.DOCKERHUB_USERNAME_OUPMAN || 'ERROR_UNAUTHORIZED_USER') }}/gsx-app
          tags: type=sha,format=short

      # [ADVANCED]: Build and push with Cache enabled
      - name: Build and Push gsx-app
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # [ADVANCED]: Security Scan with Trivy. Fails (exit-code 1) if CRITICAL vulnerabilities are found.
      - name: Security Scan (Trivy) on gsx-app
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta-app.outputs.tags }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      # [ADVANCED]: Generate SBOM (Software Bill of Materials)
      - name: Generate SBOM for gsx-app
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.meta-app.outputs.tags }}
          artifact-name: sbom-gsx-app.spdx.json

      # ---------------- NGINX ----------------
      - name: Extract metadata (Nginx)
        id: meta-nginx
        uses: docker/metadata-action@v5
        with:
          images: ${{ github.actor == 'Rafita-pino' && secrets.DOCKERHUB_USERNAME_RAFA || (github.actor == 'omiralles03' && secrets.DOCKERHUB_USERNAME_OUPMAN || 'ERROR_UNAUTHORIZED_USER') }}/nginx-gsx
          tags: type=sha,format=short

      # [ADVANCED]: Build and push with Cache enabled for Nginx
      - name: Build and Push nginx-gsx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ${{ steps.meta-nginx.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Validate Infrastructure (Terraform)
  terraform-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate